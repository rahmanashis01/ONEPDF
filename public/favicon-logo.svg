<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- PDF Document in Diamond Shape -->
  <g transform="translate(100, 100)">
    <!-- Main diamond document -->
    <polygon points="0,-85 85,0 0,85 -85,0" fill="url(#faviconGradient)"/>
    
    <!-- Document shine -->
    <polygon points="0,-85 85,0 0,-15 -85,0" fill="white" opacity="0.25"/>
    
    <!-- PDF text -->
    <text x="0" y="8" font-size="36" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">PDF</text>
    
    <!-- Lines representing content -->
    <line x1="-28" y1="24" x2="28" y2="24" stroke="white" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
    <line x1="-28" y1="38" x2="28" y2="38" stroke="white" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
    <line x1="-28" y1="52" x2="18" y2="52" stroke="white" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
  </g>
</svg>
